apiVersion: v1
kind: Secret
metadata:
  name: indexer-tools
  namespace: indexer-tools
type: Opaque
stringData:
  # The Graph Gateway API key
  GRAPH_API_KEY: ""

  # dRPC API key for RPC calls
  DRPC_API_KEY: ""

  # Pre-configured indexer accounts as JSON array.
  # HTTP endpoints are automatically proxied through nginx.
  # See DEPLOYMENT.md for full field reference.
  DEFAULT_ACCOUNTS: |
    [
      {
        "address": "0xYOUR_INDEXER_ADDRESS",
        "chain": "arbitrum-one",
        "label": "My Indexer",
        "agentEndpoint": "http://indexer-agent:8000/",
        "graphmanEndpoint": "http://graph-node:8050/",
        "graphmanToken": "your-bearer-token"
      }
    ]
