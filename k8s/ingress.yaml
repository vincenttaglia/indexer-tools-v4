apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: indexer-tools
  namespace: indexer-tools
  labels:
    app: indexer-tools
  annotations:
    # Uncomment for cert-manager TLS
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: indexer-tools.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: indexer-tools
                port:
                  name: http
  # Uncomment for TLS
  # tls:
  #   - hosts:
  #       - indexer-tools.example.com
  #     secretName: indexer-tools-tls
