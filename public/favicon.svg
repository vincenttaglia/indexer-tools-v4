<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background tile: very dark with a hint of purple, rounded corners -->
  <rect x="0" y="0" width="64" height="64" rx="12" fill="#1a0a2e"/>
  <!-- Slab-serif "I" monogram in v4 primary purple -->
  <g fill="#c084fc">
    <!-- Top serif bar -->
    <rect x="14" y="14" width="36" height="8" rx="1.5"/>
    <!-- Vertical stem -->
    <rect x="26" y="22" width="12" height="20"/>
    <!-- Bottom serif bar -->
    <rect x="14" y="42" width="36" height="8" rx="1.5"/>
  </g>
</svg>
