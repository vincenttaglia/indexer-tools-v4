name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  # Allow tag builds to gate on a green suite too.
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (type check + bundle)
        run: npm run build

      - name: Run tests
        run: npm test
