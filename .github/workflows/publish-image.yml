name: Build and Publish Docker Image

on:
  push:
    branches:
      - main
      - dev
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker meta
        id: docker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/vincenttaglia/indexer-tools-v4
          # latest=auto → :latest is applied only to the newest, non-prerelease
          # semver tag (e.g. v1.2.0, not v1.2.0-rc.1). Branch pushes never get :latest.
          flavor: |
            latest=auto
          tags: |
            # main branch → :main
            type=raw,value=main,enable=${{ github.ref == 'refs/heads/main' }}
            # development branch → :dev
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            # version tags → :1.0.0, :1.0  (+ :latest via latest=auto)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            # git sha for traceability
            type=sha

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.docker_meta.outputs.tags }}
          labels: ${{ steps.docker_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
